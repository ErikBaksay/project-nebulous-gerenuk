<section class="tool-card">
  <header class="tool-card__header">
    <div class="tool-card__topline">
      <p class="tool-card__eyebrow">Timer</p>

      @if (viewMode() === 'dashboard') {
        <div class="tool-card__header-actions">
          <button type="button" class="tool-ghost-button" (click)="openFullscreenMode()">
            Fullscreen
          </button>

          @if (floatingSupported()) {
            <button type="button" class="tool-ghost-button" (click)="openFloatingWindow()">
              {{ activeFloatingToolId() === 'timer' ? 'On top' : 'Float on top' }}
            </button>
          }
        </div>
      }
    </div>

    <h2 class="tool-card__title">Your timer, always within reach.</h2>
    <p class="tool-card__copy">Precise timing, right at your fingertips.</p>
  </header>

  <div class="chip-row">
    <span class="status-chip" [class.status-chip--running]="isRunning()">{{ timerState() }}</span>
  </div>

  <div class="tool-display" aria-live="polite">
    <p class="tool-display__value">{{ displayTime() }}</p>
    <p class="tool-display__meta">{{ helperText() }}</p>
  </div>

  <div class="tool-button-row">
    <button type="button" class="tool-button" (click)="toggleRunning()">
      {{ isRunning() ? 'Pause timer' : 'Start timer' }}
    </button>
    <button
      type="button"
      class="tool-button-secondary"
      [disabled]="elapsedMs() === 0"
      (click)="reset()"
    >
      Reset timer
    </button>
  </div>

  @if (viewMode() === 'dashboard' && floatingMessage(); as message) {
    <p class="tool-inline-note">{{ message }}</p>
  }
</section>
